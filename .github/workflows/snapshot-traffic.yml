name: Snapshot Waline Traffic

on:
  workflow_dispatch:
  schedule:
    - cron: '10 16 * * *'

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Snapshot Waline traffic
        run: npm run traffic:snapshot
        env:
          DATABASE_URL: ${{ secrets.WALINE_DATABASE_URL }}

      - name: Commit traffic snapshot
        run: |
          if git diff --quiet -- data/site-traffic.json; then
            echo "No traffic snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-traffic.json
          git commit -m "chore: snapshot Waline traffic"
          git push
